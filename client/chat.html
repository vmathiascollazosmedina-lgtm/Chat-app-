<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat App</title>

    <link rel="stylesheet" href="/client/css/chat.css">

</head>

<body>

<div class="app">

    <!-- ========================= -->
    <!-- BARRA LATERAL -->
    <!-- ========================= -->

    <aside class="sidebar">

        <div class="logo">

            💬 Chat App

        </div>

        <div class="usuario">

            <div class="avatar">
                ?
            </div>

            <div class="infoUsuario">

                <h3 id="usuarioActual">
                    Usuario
                </h3>

                <span>
                    🟢 En línea
                </span>

            </div>

            <button id="logoutBtn" title="Cerrar sesión">

                🚪

            </button>

        </div>

        <div class="menu">

            <button
                id="btnPublico"
                class="menu-btn activo">

                🌎 Chat Público

            </button>

            <button
                id="btnPrivado"
                class="menu-btn">

                👥 Chat Privado

            </button>

        </div>

        <div
            id="usuariosConectados"
            class="usuarios-panel oculto">

            <div class="usuarios-header">

                <h3>
                    Usuarios conectados
                </h3>

                <span id="cantidadUsuarios">

                    0

                </span>

            </div>

            <div id="listaUsuarios">

            </div>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- CHAT -->
    <!-- ========================= -->

    <main class="chat">

        <div class="chat-header">

            <div>

                <h2 id="chatTitulo">

                    🌎 Chat Público

                </h2>

                <span id="estadoChat">

                    Conectando...

                </span>

            </div>

        </div>

        <div
            id="messagesContainer"
            class="messages">
                    </div>

        <!-- ========================= -->
        <!-- ESCRIBIR MENSAJE -->
        <!-- ========================= -->

        <div class="input-area">

            <button
                id="btnEmoji"
                class="input-btn"
                title="Emojis">

                😊

            </button>

            <input
                type="text"
                id="messageInput"
                placeholder="Escribe un mensaje..."
                autocomplete="off"
            >

            <button
                id="sendMessage"
                class="send-btn">

                ➤

            </button>

        </div>

    </main>

</div>

<!-- ========================= -->
<!-- SOCKET.IO -->
<!-- ========================= -->

<script src="http://localhost:3000/socket.io/socket.io.js"></script>

<!-- ========================= -->
<!-- CHAT -->
<!-- ========================= -->

<script src="/client/js/chat.js"></script>

</body>
</html>
