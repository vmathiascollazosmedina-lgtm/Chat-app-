<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat App</title>

    <link rel="stylesheet" href="/client/css/chat.css">

</head>


<body>


<div class="app">


    <!-- ========================= -->
    <!-- BARRA LATERAL -->
    <!-- ========================= -->


    <aside class="sidebar">


        <div class="logo">

            💬 Chat App

        </div>



        <div class="usuario">


            <div class="avatar">

                ?

            </div>



            <div>

                <h3 id="usuarioActual">
                    Usuario
                </h3>


                <span>
                    🟢 En línea
                </span>


            </div>


        </div>





        <div class="chats">


            <button id="btnPublico">

                🌎 Chat Público

            </button>


            <button id="btnPrivado">

                👥 Chat Privado

            </button>


        </div>



    </aside>





    <!-- ========================= -->
    <!-- CHAT PRINCIPAL -->
    <!-- ========================= -->


    <main class="chat">


        <div class="chat-header">


            <h2>

                Chat Público

            </h2>


        </div>





        <!-- MENSAJES -->


        <div 
        id="messagesContainer"
        class="messages">


        </div>





        <!-- ESCRIBIR -->


        <div class="input-area">


            <input

                type="text"

                id="messageInput"

                placeholder="Escribe un mensaje..."

                autocomplete="off"

            >



            <button id="sendMessage">

                Enviar

            </button>



        </div>



    </main>



</div>





<!-- SOCKET.IO -->

<script src="http://localhost:3000/socket.io/socket.io.js"></script>


<!-- CHAT JS -->

<script src="/client/js/chat.js"></script>


</body>


</html>
